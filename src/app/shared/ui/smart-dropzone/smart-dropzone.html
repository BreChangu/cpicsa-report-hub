<div 
  class="dropzone-container" 
  [class.drag-active]="isDragging()"
  (click)="fileInput.click()">
  
  <input 
    type="file" 
    #fileInput 
    multiple 
    accept="image/jpeg, image/png, image/jpg" 
    (change)="onFileSelected($event)" 
    hidden>

  <div class="dropzone-content">
    <div class="icon-wrapper">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M12 12v9"/>
        <path d="M8 17l4 4 4-4"/>
      </svg>
    </div>
    <h3 class="title">Pega tus capturas de pantalla aquí</h3>
    <p class="subtitle">Presiona <strong>Ctrl + V</strong> con tu recorte de WhatsApp, arrastra la imagen o haz clic para subir.</p>
  </div>
</div>
